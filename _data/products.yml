  - category: Smart Watches
    name: Amazfit Active 2 Smart Watch , 44mm  , Black Silicone , New , Sealed
    description: >-
      The Amazfit Active 2 Smart Watch 44mm is a versatile fitness-focused
      smartwatch designed to support an active lifestyle while also offering
      everyday smart functions. With a sleek, modern look and a comfortable
      black silicone band, it’s suitable for both workouts and casual wear. The
      44mm size provides a clear, easy-to-read screen that displays your
      activity stats, health data, and navigation guidance with minimal effort.
      This watch bridges the gap between style and performance, making it a
      great companion for anyone wanting to stay motivated and connected
      throughout the day.


