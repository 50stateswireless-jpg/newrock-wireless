  - name: Samsung Galaxy Rugged Tab Active 5 Enterprise Edition  , 128GB 6GB Ram ,
      USA Version , Wi-Fi Only , New , Sealed
    description: >
      The Samsung Galaxy Tab Active5 Enterprise Edition is a compact, rugged
      8-inch tablet engineered for business professionals working in demanding
      environments. Designed to withstand harsh conditions, it features
      IP68-rated water and dust resistance, MIL-STD-810H durability testing, and
      a rugged construction that helps protect against drops, shocks, and
      everyday workplace hazards. Its bright 8-inch WUXGA display with a smooth
      120Hz refresh rate delivers clear visuals and responsive touch
      performance, even when operated with gloves.


      Powered by the Samsung Exynos 1380 octa-core processor and equipped with 6GB of RAM, the Galaxy Tab Active5 provides reliable performance for business applications, field service software, inventory management, mobile productivity, and multitasking. The tablet includes 128GB of internal storage and supports microSD cards up to 1TB, providing ample space for applications, documents, photos, and operational data.


      Built for mobile workforces, the device offers Wi-Fi 6 connectivity, Bluetooth 5.3, NFC, GPS positioning support, USB Type-C connectivity, and a programmable Active Key for quick access to frequently used functions. The included IP68-rated S Pen enables precise input for note-taking, form completion, digital signatures, and workflow management, making it ideal for industries such as logistics, manufacturing, transportation, healthcare, public safety, and field services.


      The Galaxy Tab Active5 Enterprise Edition also incorporates Samsung Knox security, biometric authentication, Samsung DeX desktop functionality, and enterprise-grade device management capabilities. Its removable 5,050mAh battery supports extended productivity throughout the workday, while No Battery Mode allows operation from a direct power source in fixed installations and vehicle-mounted environments.


      As an Enterprise Edition device, the Galaxy Tab Active5 includes enhanced business support, extended software maintenance, regular security updates, and Samsung Knox Suite licensing, helping organizations deploy, secure, and manage devices efficiently throughout their lifecycle. Combining rugged durability, advanced security, and modern mobile productivity features, the Galaxy Tab Active5 Enterprise Edition is an ideal solution for businesses requiring dependable performance in challenging work environments.    Specifications


