    name: JBL Tune Flex Active, Noise Cancelling Wireless Earbuds , New ,Sealed
    category: Headsets & Earbuds
    price: 149.95
    description: >-
      The JBL Tune Flex True Wireless Earbuds

      stand out for their unique "multi-design" transformation capability, letting you switch between an open-ear design (similar to Apple AirPods) and a traditional noise-isolating in-ear design. Reviewers on YouTube emphasize that while their Active Noise Cancellation (ANC) is lighter than a permanent in-ear bud, they offer unmatched physical flexibility and long-lasting casual wear comfort. 

      The Transforming "Flex" Design

          Open Fit: Wear them without silicone tips to maintain natural ambient environmental awareness and zero ear-canal pressure.
          Sealed Fit: Snap on one of the three included sizes of sealing ear tips to create a tight acoustic seal, immediately strengthening bass performance and maximizing the active noise isolation. 

      Core Technical Specifications

          12mm Dynamic Drivers: Smartly optimized to deliver signature JBL Pure Bass Sound, providing extra warmth and high volume capability.
          32-Hour Battery Life: Yields up to 8 hours of playback per charge with ANC turned off, plus an additional 24 hours via the case. Turning ANC on yields 6 hours per charge and 18 hours in the case.
          Speed Charging: A quick 10-minute drop in the case provides 2 full hours of backup listening time.
          4-Microphone Call Setup: Equipped with dual beamforming microphones on each earbud to isolate speech while using VoiceAware to adjust how much of your own voice you hear.
          Smart Ambient & TalkThru: Uses the microphone array to pass environmental safety audio through the driver, or drops music volume entirely to let you chat without removing the earbuds.
          IPX4 Weather Proofing: Certified splashproof and sweatproof to handle heavy gym workouts or rainy weather runs. 
