    category: Smart Watches
    description: >
      The Garmin Instinct E 45 mm Rugged Outdoor GPS Smartwatch is a tough,
      adventure-ready wearable built for people who spend time outdoors, stay
      active, or simply want reliable day-to-day health tracking. It sports a
      rugged 45 mm fiber-reinforced polymer case with a chemically strengthened,
      scratch-resistant display that’s engineered to meet military-grade
      standards for thermal and shock resistance and is water-rated to 10 ATM
      (up to 100 m), so it’s ready for hikes, swims, and everyday wear without
      worry. You can choose it in a subtle charcoal finish or a high-visibility
      electric lime color — both versions have identical performance and
      features.


      Designed to support your health and fitness journey around the clock, this smartwatch delivers comprehensive 24/7 monitoring. It tracks wrist-based heart rate every second, daily resting heart rate, respiration, advanced sleep and sleep score, Pulse Ox blood oxygen saturation (where available), stress and relaxation, body battery energy levels, and more — giving you well-rounded insights into how your body is functioning. Through the Garmin Connect app you can also view hydration and women’s health tracking, get suggested workouts, and access deeper wellness data.


      The Instinct E includes built-in multi-GNSS (GPS, GLONASS, and Galileo) positioning for reliable route tracking and navigation even in challenging terrain. A 3-axis compass and barometric altimeter support outdoor navigation, while smart connectivity features let you receive smartphone notifications and access the Connect IQ Store to add watch faces and apps when paired with a compatible smartphone.


      Battery life is a strong suit: you can expect up to 16 days of use in smartwatch mode on a single charge, and extended runtimes in various GPS modes or battery saver settings depending on how you use it. This makes it well suited to long weekends away, multiday trips, or simply fewer charges between daily use. Whether you’re exploring the outdoors or tracking everyday health and fitness, the Garmin Instinct E blends durability with practical functionality.    Specifications


